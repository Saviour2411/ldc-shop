name: Docker Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to publish and deploy"
        required: true
        default: "manual"

permissions:
  contents: read

env:
  IMAGE_NAME: saviour2411/ldc-shop
  DEPLOY_DIR: /root/proj/ldc-shop
  SERVER_PORT: 22748
  SERVER_HOST_KEY: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMOH0kkBWz/VeSs6Z9zh0XtmPISOQjdue+2R+pdV4+N/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="${{ github.event.inputs.image_tag }}"
          fi
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./_docker
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.release_tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null
          printf '[%s]:%s %s\n' "${{ secrets.SERVER_HOST }}" "${{ env.SERVER_PORT }}" "${{ env.SERVER_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Test SSH login
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/deploy_key" -p "${{ env.SERVER_PORT }}" -o BatchMode=yes -o ConnectTimeout=20 -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "echo ssh_ok"

      - name: Copy deploy script
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i $HOME/.ssh/deploy_key -p ${{ env.SERVER_PORT }} -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no"
          ssh ${SSH_OPTS} "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "mkdir -p '${DEPLOY_DIR}/deploy'"
          scp -i ~/.ssh/deploy_key -P "${{ env.SERVER_PORT }}" -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no deploy/server-deploy.sh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${DEPLOY_DIR}/deploy/server-deploy.sh"

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          SSH_OPTS="-i $HOME/.ssh/deploy_key -p ${{ env.SERVER_PORT }} -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no"
          ssh ${SSH_OPTS} "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "chmod +x '${DEPLOY_DIR}/deploy/server-deploy.sh' && '${DEPLOY_DIR}/deploy/server-deploy.sh'"
